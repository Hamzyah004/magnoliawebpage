<section class="section">
  <div class="container">
    <h1 class="h1 grad-title" style="margin-bottom: 32px;">Potvrda narudžbe</h1>

    <div class="checkout-grid">
      <!-- Customer Form -->
      <div class="card" style="padding: 32px; background: white; border: 1px solid var(--line); border-radius: var(--radius);">
        <h2 class="h2" style="margin-bottom: 24px;">Informacije za dostavu</h2>
        <form id="checkout-form">
          <div class="checkout-form-row">
            <div>
              <label class="muted" style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Ime</label>
              <input type="text" name="firstname" required style="width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px;">
            </div>
            <div>
              <label class="muted" style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Prezime</label>
              <input type="text" name="lastname" required style="width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px;">
            </div>
          </div>
          
          <div style="margin-bottom: 16px;">
            <label class="muted" style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Email adresa</label>
            <input type="email" name="email" required style="width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label class="muted" style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Broj telefona</label>
            <input type="tel" name="phone" required style="width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px;">
          </div>

          <div style="margin-bottom: 16px;">
            <label class="muted" style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Adresa stanovanja</label>
            <input type="text" name="address" required style="width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px;">
          </div>

          <div class="checkout-form-row checkout-form-row--city" style="margin-bottom: 24px;">
            <div>
              <label class="muted" style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Grad</label>
              <input type="text" name="city" required style="width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px;">
            </div>
            <div>
              <label class="muted" style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Poštanski broj</label>
              <input type="text" name="zip" required style="width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px;">
            </div>
          </div>

          <button type="submit" class="btn btn--primary" style="width: 100%; padding: 16px; font-size: 1.1rem;">Završi narudžbu</button>
        </form>
      </div>

      <!-- Order Summary -->
      <div class="card card--sticky" style="padding: 24px; background: var(--soft); border-radius: var(--radius); position: sticky; top: 100px;">
        <h3 class="h2" style="margin-bottom: 20px;">Vaša narudžba</h3>
        <div id="checkout-items" style="margin-bottom: 24px;">
          <!-- Items will be injected here -->
        </div>

        <div style="border-top: 1px solid var(--line); padding-top: 16px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span class="muted">Međuzbir:</span>
            <span id="checkout-subtotal">0.00 KM</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
            <span class="muted">Poštarina:</span>
            <span id="checkout-shipping">11.00 KM</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-top: 16px; font-weight: 800; font-size: 1.2rem; color: var(--navy);">
            <span>Ukupno:</span>
            <span id="checkout-total">0.00 KM</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
