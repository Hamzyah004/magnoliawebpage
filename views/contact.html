<section class="section section--beige">
  <div class="container section__grid">
    <div>
      <span class="kicker">Kontakt</span>
      <h1 class="h1">Javi se</h1>
      <p class="lead">Piši nam za narudžbe, saradnju ili pitanja oko njege.</p>

      <div class="card" style="margin-top:18px;">
        <p class="muted" style="margin:0;"><strong>Email:</strong> magnolianaturalbih@gmail.com</p>
        <p class="muted" style="margin:6px 0 0; display:flex; align-items:center; gap:6px;">
          <strong>Instagram:</strong> @magnolia_naturalcosmetics
          <a
            href="https://www.instagram.com/magnolia_naturalcosmetics/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Otvori Instagram profil Magnolia Natural Cosmetics"
            class="ig-link"
            style="display:inline-flex; align-items:center; line-height:1;"
          >
            <!-- Instagram SVG icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9A5.5 5.5 0 0 1 16.5 22h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2Z"
                    stroke="currentColor" stroke-width="2"/>
              <path d="M12 16.2a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Z"
                    stroke="currentColor" stroke-width="2"/>
              <path d="M17.7 6.3h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </a>
        </p>

        <p class="muted" style="margin:6px 0 0;"><strong>Radno vrijeme:</strong> Pon–Pet 09:00–17:00</p>
      </div>
    </div>

    <div class="card">
      <h2 class="h2">Pošalji poruku</h2>
      <form class="form" data-contact-form>
        <input class="input" name="name" placeholder="Ime i prezime" required />
        <input class="input" type="email" name="email" placeholder="Email" required />
        <input class="input" name="subject" placeholder="Tema" required />
        <textarea class="textarea" name="message" placeholder="Poruka..." required></textarea>
        <button class="btn btn--primary" type="submit">Pošalji poruku</button>
      </form>
    </div>
  </div>
</section>
