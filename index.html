<!doctype html>
<html lang="bs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Magnolia Natural Cosmetics je domaći bosanskohercegovački brend, koji nudi prirodnu njegu, kroz pažljivo birane sastojke, nježne formulacije i vidljive rezultate." />
  <meta property="og:title" content="Magnolia Natural Cosmetics">
  <meta property="og:description" content="Prirodna kozmetika za lice i kosu">
  <meta property="og:image" content="https://magnoliacosmetics.beauty/preview.jpg">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <title>Magnolia Natural Cosmetics | Prirodna kozmetika</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="topbar">
    <div class="container topbar__inner topbar__3col">

      <!-- LEFT: brand text -->
      <a class="brand-text" href="#/" data-link>
        <span class="brand-text__main">MAGNOLIA</span>
        <span class="brand-text__sub">NATURAL COSMETICS</span>
      </a>

      <!-- CENTER: logo -->
      <a class="brand-logo-center" href="#/" data-link aria-label="Magnolia Home">
        <img src="assets/img/logo.png" alt="Magnolia Natural Cosmetics logo" />
      </a>

      <!-- RIGHT: navigation -->
      <nav class="nav">
        <a class="nav__link" href="#/" data-link>Home</a>
        <a class="nav__link" href="#/o-nama" data-link>O nama</a>
        <a class="nav__link" href="#/proizvodi" data-link>Proizvodi</a>
        <a class="nav__link nav__cta" href="#/kontakt" data-link>Kontakt</a>
      </nav>

      <!-- mobile -->
      <button class="nav__toggle" aria-label="Otvori meni" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

    </div>
  </header>

  <div class="modal" id="product-modal" aria-hidden="true">
    <div class="modal__overlay" data-modal-close></div>

    <div class="modal__dialog" role="dialog" aria-modal="true" aria-label="Detalji proizvoda">
      <button class="modal__close" type="button" aria-label="Zatvori" data-modal-close>×</button>

      <div class="modal__content">
        <div class="modal__image">
          <img id="modal-img" src="" alt="">
        </div>

        <div class="modal__text">
          <h2 class="h2" id="modal-title"></h2>
          <div id="modal-price" style="font-weight:700; color:var(--gold); font-size:1.2rem; margin-top:8px;"></div>
          <button id="modal-add-to-cart" class="btn-add-cart" style="margin-top:20px; padding:14px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            Dodaj u korpu
          </button>
          <p class="lead" id="modal-desc" style="margin-top:20px;"></p>
        </div>
      </div>
    </div>
  </div>



  <main id="app" class="app" aria-live="polite"></main>

  <!-- Cart Drawer -->
  <div class="cart-drawer" id="cart-drawer" aria-hidden="true">
    <div class="cart-drawer__overlay" data-cart-close></div>
    <div class="cart-drawer__content">
      <div class="cart-drawer__header">
        <h2 class="h2" style="margin:0;">Vaša korpa</h2>
        <button class="cart-drawer__close" data-cart-close aria-label="Zatvori korpu">&times;</button>
      </div>
      
      <div class="cart-drawer__items" id="cart-items">
        <!-- Items will be injected here -->
        <p class="muted" style="padding: 20px; text-align: center;">Korpa je prazna.</p>
      </div>

      <div class="cart-drawer__footer">
        <div class="cart-drawer__summary">
          <div class="cart-drawer__row">
            <span>Međuzbir:</span>
            <span id="cart-subtotal">0.00 KM</span>
          </div>
          <div class="cart-drawer__row">
            <span>Poštarina:</span>
            <span id="cart-shipping">0.00 KM</span>
          </div>
          <hr style="border: 0; border-top: 1px solid var(--line); margin: 12px 0;">
          <div class="cart-drawer__row cart-drawer__row--total">
            <span>Ukupno:</span>
            <span id="cart-total-price">0.00 KM</span>
          </div>
        </div>
        <button id="checkout-btn" class="btn btn--primary" style="width:100%; margin-top:16px;">Naruči</button>
      </div>
    </div>
  </div>

  <!-- Floating Cart Toggle -->
  <button id="cart-toggle" class="cart-toggle" aria-label="Otvori korpu">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span id="cart-count" class="cart-toggle__count">0</span>
  </button>

  <footer class="footer">
    <div class="container footer__inner">
      <p>© <span id="y"></span> Magnolia Natural Cosmetics</p>
      <p class="muted">Prirodna njega. Nježne formulacije. Ritual njege</p>
    </div>
  </footer>

  <button id="scrollTopBtn" aria-label="Scroll to top">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M6 14L12 8L18 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <script type="module" src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init("cIwVQboFkKcmA--1Q");
  </script>

</body>
</html>
